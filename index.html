<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>School Book Label</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--gold:#FFD700;--or:#FF6500;--gr:#25D366;--dk:#050508;}

html,body{
  width:100%;height:100%;background:#111;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;font-family:'Montserrat',sans-serif;
}

#W{
  position:relative;
  width:100vmin;height:100vmin;
  overflow:hidden;background:#000;
}

/* ── TRANSITION FLASH ── */
#tf{position:absolute;inset:0;background:#000;opacity:0;z-index:200;pointer-events:none;transition:opacity 0.15s ease;}
#tf.in{opacity:1;}

.sc{position:absolute;inset:0;opacity:0;pointer-events:none;}
.sc.on{opacity:1;pointer-events:all;}

/* ── CAPTION ── */
.cap{position:absolute;bottom:8%;left:4%;right:4%;z-index:80;text-align:center;pointer-events:none;}
.cap p{
  display:inline-block;
  background:rgba(0,0,0,0.86);backdrop-filter:blur(10px);
  color:#fff;font-weight:800;font-size:clamp(12px,3.1vmin,16px);
  padding:8px 16px;border-radius:10px;line-height:1.5;
  border-top:2px solid rgba(255,215,0,0.5);
  opacity:0;transform:translateY(10px);
  animation:capIn 0.3s ease forwards;
}
@keyframes capIn{to{opacity:1;transform:translateY(0);}}
.g{color:var(--gold);}.r{color:#FF6060;}.gr{color:var(--gr);}

#bar{position:absolute;bottom:0;left:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--or));z-index:999;width:0%;border-radius:4px;}

#dots{position:absolute;top:2.5%;right:3%;display:flex;gap:5px;z-index:99;}
.dot{width:6px;height:6px;background:rgba(255,255,255,0.2);border-radius:50%;transition:all 0.3s;}
.dot.on{background:var(--gold);width:18px;border-radius:3px;}

#logo{position:absolute;top:2.5%;left:3%;z-index:99;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);border:1px solid rgba(255,215,0,0.25);border-radius:20px;padding:4px 11px;color:var(--gold);font-size:clamp(10px,2.7vmin,13px);font-weight:800;letter-spacing:0.5px;}

#play{position:absolute;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;cursor:pointer;}
#play .pc{width:clamp(70px,18vmin,88px);height:clamp(70px,18vmin,88px);background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,8vmin,36px);padding-left:5px;box-shadow:0 0 0 14px rgba(255,215,0,0.1),0 0 55px rgba(255,215,0,0.4);animation:pp 2s ease-in-out infinite;}
@keyframes pp{0%,100%{box-shadow:0 0 0 14px rgba(255,215,0,0.1),0 0 55px rgba(255,215,0,0.4);}50%{box-shadow:0 0 0 26px rgba(255,215,0,0.05),0 0 75px rgba(255,215,0,0.6);}}
#play p{color:rgba(255,255,255,0.55);margin-top:14px;font-weight:800;font-size:clamp(11px,3vmin,14px);letter-spacing:2px;}

@keyframes fU{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes spinR{to{transform:rotate(-360deg);}}

/* ═══════════════════════════════════
   S0 – INTRO
═══════════════════════════════════ */
#s0{background:radial-gradient(ellipse at 50% 38%,#1c0e00,#000 68%);}
#s0 .pts{position:absolute;inset:0;pointer-events:none;}
.pt{position:absolute;border-radius:50%;background:var(--gold);animation:ptF linear infinite;}
@keyframes ptF{0%{transform:translateY(105%);opacity:0;}8%{opacity:0.9;}88%{opacity:0.4;}100%{transform:translateY(-2%);opacity:0;}}
#s0 .box{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);display:flex;flex-direction:column;align-items:center;animation:iboxIn 0.6s 0.2s cubic-bezier(.22,1,.36,1) both;}
@keyframes iboxIn{from{opacity:0;transform:translate(-50%,-52%) scale(0.72);}to{opacity:1;transform:translate(-50%,-52%) scale(1);}}
#s0 .ring{width:clamp(88px,22vmin,128px);height:clamp(88px,22vmin,128px);border-radius:50%;border:2px solid rgba(255,215,0,0.3);display:flex;align-items:center;justify-content:center;position:relative;animation:spin 9s linear infinite;}
#s0 .ring::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(255,215,0,0.1);}
#s0 .ring .ico{font-size:clamp(42px,11vmin,62px);animation:spinR 9s linear infinite;}
#s0 h1{font-size:clamp(24px,6.5vmin,36px);font-weight:900;color:#fff;letter-spacing:3px;text-align:center;line-height:1.1;margin-top:clamp(12px,3vmin,18px);text-shadow:0 0 40px rgba(255,215,0,0.35);}
#s0 h1 b{color:var(--gold);}
#s0 .sub{color:rgba(255,255,255,0.38);font-size:clamp(9px,2.2vmin,12px);font-weight:800;letter-spacing:3px;margin-top:7px;text-transform:uppercase;text-align:center;}
#s0 .gline{width:clamp(80px,24vmin,130px);height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:clamp(8px,2vmin,14px) auto 0;animation:fU 0.5s 0.7s ease both;opacity:0;}

/* ═══════════════════════════════════
   S1 – PROBLEM
═══════════════════════════════════ */
#s1{background:linear-gradient(160deg,#0b0800,#180a00);}
#s1::before,#s1::after{content:'';position:absolute;left:0;right:0;height:7.5%;background:#000;z-index:5;}
#s1::before{top:0;}#s1::after{bottom:0;}
#s1 .inner{position:absolute;inset:7.5%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,3vmin,18px);padding:0 7%;}
#s1 .big{font-size:clamp(52px,14vmin,78px);animation:shake 0.5s 0.25s ease both;display:block;text-align:center;}
@keyframes shake{0%,100%{transform:rotate(0);}30%{transform:rotate(-9deg);}70%{transform:rotate(9deg);}}
#s1 .t1{font-size:clamp(17px,4.8vmin,25px);font-weight:900;color:#fff;text-align:center;line-height:1.35;animation:fU 0.45s 0.35s ease both;}
#s1 .t1 b{color:var(--gold);}
#s1 .t2{color:rgba(255,255,255,0.4);font-size:clamp(11px,2.8vmin,15px);font-weight:700;text-align:center;animation:fU 0.45s 0.55s ease both;}

/* ═══════════════════════════════════
   S2 – STICKER SHEET ON TABLE (3D MOCKUP)
═══════════════════════════════════ */
#s2{overflow:hidden;}

/* REALISTIC WOODEN TABLE */
#s2 .wood{
  position:absolute;inset:0;
  background:
    linear-gradient(92deg,
      rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 10%,
      rgba(0,0,0,0) 12%, rgba(255,255,255,0.02) 22%,
      rgba(0,0,0,0.02) 30%, rgba(255,255,255,0.015) 42%,
      rgba(0,0,0,0) 50%, rgba(255,255,255,0.025) 60%,
      rgba(0,0,0,0.015) 70%, rgba(255,255,255,0.02) 80%,
      rgba(0,0,0,0) 90%, rgba(255,255,255,0.01) 100%
    ),
    linear-gradient(180deg,#5c3a1e 0%,#7a4e2d 18%,#6b4424 35%,#8a5c35 50%,#6b4020 65%,#7a4e2d 80%,#5a3618 100%);
}
/* Wood grain lines */
#s2 .wood::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 18px,
    rgba(0,0,0,0.04) 18px, rgba(0,0,0,0.04) 20px,
    transparent 20px, transparent 45px,
    rgba(255,255,255,0.02) 45px, rgba(255,255,255,0.02) 46px,
    transparent 46px, transparent 70px,
    rgba(0,0,0,0.03) 70px, rgba(0,0,0,0.03) 72px
  );
}
/* Top lighter surface */
#s2 .table-top{
  position:absolute;top:0;left:0;right:0;height:52%;
  background:linear-gradient(180deg,
    #8b6040 0%,#7a5030 15%,#9a6840 30%,
    #8a5830 55%,#7a5030 75%,#9a6840 100%
  );
}
#s2 .table-top::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    87deg,
    transparent 0px, transparent 25px,
    rgba(0,0,0,0.03) 25px, rgba(0,0,0,0.03) 26px,
    transparent 26px, transparent 55px,
    rgba(255,255,255,0.025) 55px, rgba(255,255,255,0.025) 57px
  );
}
/* Table edge highlight */
#s2 .table-edge{
  position:absolute;top:52%;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#3d2010,#6a3c1e,#8b5030,#6a3c1e,#3d2010);
  box-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:2;
}
/* Table bottom face */
#s2 .table-front{
  position:absolute;top:calc(52% + 3px);left:0;right:0;bottom:0;
  background:linear-gradient(180deg,#4a2a10,#3a1e0a);
  background-image:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 42px);
}

/* SPOTLIGHT on table */
#s2 .spotlight{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:90%;height:55%;
  background:radial-gradient(ellipse 70% 80% at 50% 30%,rgba(255,220,150,0.18),transparent 65%);
  pointer-events:none;z-index:3;
}

/* STICKER SHEET - 3D PERSPECTIVE ON TABLE */
#s2 .sheet-3d{
  position:absolute;
  top:4%;left:50%;
  transform-origin:center bottom;
  width:82%;
  z-index:10;
  animation:sheetLand 0.7s 0.25s cubic-bezier(.22,1,.36,1) both;
  opacity:0;
}
@keyframes sheetLand{
  from{opacity:0;transform:translateX(-50%) perspective(600px) rotateX(55deg) rotateZ(-1.5deg) translateY(-30px);}
  to{opacity:1;transform:translateX(-50%) perspective(600px) rotateX(22deg) rotateZ(-1.5deg) translateY(0);}
}
#s2 .sheet-3d .paper{
  position:relative;
  border-radius:6px;
  overflow:hidden;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.65),
    0 10px 25px rgba(0,0,0,0.4),
    0 2px 6px rgba(0,0,0,0.3),
    inset 0 0 0 1px rgba(255,255,255,0.12);
}
#s2 .sheet-3d .paper img{width:100%;display:block;}
/* Paper surface sheen */
#s2 .sheet-3d .sheen{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 40%,rgba(0,0,0,0.05) 100%);
  pointer-events:none;
}
/* Peel corner */
#s2 .peel-corner{
  position:absolute;bottom:0;right:0;
  width:clamp(22px,6vmin,32px);height:clamp(22px,6vmin,32px);
  background:linear-gradient(225deg,#e8e0d0 40%,rgba(180,160,130,0.6) 60%,transparent 75%);
  clip-path:polygon(100% 0,0 100%,100% 100%);
  animation:peelCorner 0.4s 0.9s ease both;opacity:0;
  filter:drop-shadow(-2px -2px 3px rgba(0,0,0,0.3));
}
@keyframes peelCorner{to{opacity:1;}}
/* Sheet shadow on table */
#s2 .sheet-shadow{
  position:absolute;top:49%;left:9%;right:9%;height:clamp(16px,4vmin,24px);
  background:radial-gradient(ellipse,rgba(0,0,0,0.5),transparent 70%);
  filter:blur(8px);z-index:9;
  animation:shadowIn 0.7s 0.3s ease both;opacity:0;
}
@keyframes shadowIn{to{opacity:1;}}

/* LABEL top */
#s2 .slbl{
  position:absolute;top:6%;left:0;right:0;text-align:center;
  color:rgba(255,215,0,0.85);font-size:clamp(9px,2.3vmin,12px);font-weight:800;
  letter-spacing:4px;text-transform:uppercase;z-index:20;
  animation:fU 0.35s 0.1s ease both;
}

/* BOTTOM area – pencils/stationery decorations */
#s2 .deco{
  position:absolute;bottom:0;left:0;right:0;height:48%;
  display:flex;align-items:flex-end;justify-content:space-around;padding:0 6% clamp(8px,2vmin,14px);
  z-index:4;
}
.deco-item{
  font-size:clamp(22px,6vmin,34px);
  animation:dIn ease both;
}
.deco-item:nth-child(1){animation-duration:0.4s;animation-delay:0.6s;transform:rotate(-15deg);}
.deco-item:nth-child(2){animation-duration:0.4s;animation-delay:0.75s;transform:rotate(8deg);}
.deco-item:nth-child(3){animation-duration:0.4s;animation-delay:0.9s;transform:rotate(-6deg);}
.deco-item:nth-child(4){animation-duration:0.4s;animation-delay:1.05s;transform:rotate(12deg);}
@keyframes dIn{from{opacity:0;transform:translateY(15px) rotate(-15deg);}to{opacity:1;}}

/* ═══════════════════════════════════
   S3 – PEEL & STICK (REALISTIC SIZE)
═══════════════════════════════════ */
#s3{background:linear-gradient(160deg,#0a1020,#101828);}

/* DESK surface */
#s3 .desk-wood{
  position:absolute;bottom:0;left:0;right:0;height:44%;
  background:linear-gradient(180deg,#7a5030 0%,#5c3a1e 40%,#4a2e14 100%);
}
#s3 .desk-wood::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(88deg,transparent,transparent 30px,rgba(0,0,0,0.04) 30px,rgba(0,0,0,0.04) 31px,transparent 31px,transparent 60px,rgba(255,255,255,0.018) 60px,rgba(255,255,255,0.018) 61px);}
#s3 .desk-edge{position:absolute;top:56%;left:0;right:0;height:2px;background:linear-gradient(90deg,#2a1808,#5a3420,#4a2816,#5a3420,#2a1808);z-index:2;}

/* BOOK – realistic school book */
#s3 .book-wrap{
  position:absolute;
  bottom:38%;left:50%;
  transform:translateX(-50%);
  width:clamp(110px,28vmin,160px);
  z-index:10;
  animation:bookIn 0.4s 0.15s ease both;opacity:0;
}
@keyframes bookIn{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.book-3d{
  position:relative;
  width:100%;
  padding-bottom:130%;
  transform-style:preserve-3d;
  transform:perspective(600px) rotateY(-12deg);
}
/* Front cover */
.book-cover{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#c0392b,#e74c3c,#c0392b);
  border-radius:2px 8px 8px 2px;
  box-shadow:
    -6px 4px 0 #7a1f18,
    -8px 6px 15px rgba(0,0,0,0.6),
    inset 2px 0 0 rgba(255,255,255,0.1),
    inset 0 2px 0 rgba(255,255,255,0.07);
}
/* Spine */
.book-spine{
  position:absolute;top:0;bottom:0;left:0;
  width:clamp(10px,2.5vmin,15px);
  background:linear-gradient(90deg,#5a1208,#8a1f14,#6a1810);
  border-radius:2px 0 0 2px;
  box-shadow:inset -2px 0 4px rgba(0,0,0,0.3);
}
/* Cover lines */
.book-lines{position:absolute;top:15%;left:18%;right:10%;display:flex;flex-direction:column;gap:clamp(5px,1.4vmin,9px);}
.book-line{height:2px;background:rgba(255,255,255,0.15);border-radius:2px;}
.book-line:first-child{width:45%;background:rgba(255,255,255,0.25);}
/* Cover corner fold */
.book-fold{position:absolute;bottom:0;right:0;width:clamp(10px,2.5vmin,14px);height:clamp(10px,2.5vmin,14px);background:linear-gradient(225deg,rgba(0,0,0,0.3),transparent);clip-path:polygon(100% 0,0 100%,100% 100%);}

/* STICKER – realistic small label size (top-left area of book) */
#s3 .sticker-label{
  position:absolute;
  /* Place at top-left of book cover, realistic small size */
  width:clamp(80px,22vmin,125px);
  /* starts from above, flies down and sticks */
  z-index:30;
  bottom:calc(38% + clamp(93px,23.4vmin,134px)); /* top of book */
  left:50%;
  transform:translateX(calc(-50% - clamp(10px,2.5vmin,14px))); /* offset left like real label */
  animation:stickerFly 1.8s 0.6s cubic-bezier(.22,1,.36,1) both;
  opacity:0;
}
@keyframes stickerFly{
  0%{opacity:0;transform:translateX(calc(-50% - clamp(10px,2.5vmin,14px))) translateY(-clamp(60px,16vmin,90px)) rotate(-12deg) scale(1.15);}
  15%{opacity:1;}
  55%{transform:translateX(calc(-50% - clamp(10px,2.5vmin,14px))) translateY(-clamp(5px,1.3vmin,7px)) rotate(-3deg) scale(1.04);}
  80%{transform:translateX(calc(-50% - clamp(10px,2.5vmin,14px))) translateY(clamp(2px,0.5vmin,3px)) rotate(0deg) scale(1.01);}
  100%{opacity:1;transform:translateX(calc(-50% - clamp(10px,2.5vmin,14px))) translateY(0) rotate(0deg) scale(1);}
}
#s3 .sticker-label img{
  width:100%;border-radius:6px;display:block;
  box-shadow:0 8px 25px rgba(0,0,0,0.55),0 2px 8px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.1);
}
/* Peel corner on sticker */
#s3 .stk-corner{
  position:absolute;bottom:-3px;right:-3px;
  width:clamp(12px,3vmin,18px);height:clamp(12px,3vmin,18px);
  background:linear-gradient(225deg,rgba(255,255,255,0.5),transparent 55%);
  clip-path:polygon(100% 0,0 100%,100% 100%);
  animation:fU 0.3s 0.55s ease both;opacity:0;
}
/* Success burst */
#s3 .burst{
  position:absolute;bottom:calc(38% + clamp(93px,23.4vmin,134px) + clamp(20px,5.5vmin,30px));
  left:50%;transform:translateX(-50%);
  font-size:clamp(20px,5.5vmin,28px);
  opacity:0;animation:burstIn 0.5s 2.2s ease both;pointer-events:none;
}
@keyframes burstIn{0%{opacity:0;transform:translateX(-50%) scale(0.3);}60%{opacity:1;transform:translateX(-50%) scale(1.2);}100%{opacity:1;transform:translateX(-50%) scale(1);}}

/* Top label */
#s3 .s3lbl{position:absolute;top:7%;left:0;right:0;text-align:center;color:var(--gold);font-size:clamp(10px,2.5vmin,13px);font-weight:800;letter-spacing:3px;text-transform:uppercase;animation:fU 0.35s 0.1s ease both;}

/* Stationery on desk */
#s3 .desk-items{
  position:absolute;bottom:0;left:0;right:0;height:44%;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 4% clamp(6px,1.5vmin,10px);z-index:5;
}
.d-item{font-size:clamp(18px,5vmin,26px);animation:dIn ease both;opacity:0;}
.d-item:nth-child(1){animation-duration:0.4s;animation-delay:0.5s;transform:rotate(-20deg);}
.d-item:nth-child(2){animation-duration:0.4s;animation-delay:0.65s;}
.d-item:nth-child(3){animation-duration:0.4s;animation-delay:0.8s;transform:rotate(15deg);}

/* ═══════════════════════════════════
   S4 – 3 FEATURED DESIGNS CAROUSEL
═══════════════════════════════════ */
#s4{background:linear-gradient(160deg,#06060e,#0c0c1e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:0 4%;}
#s4 .h4{text-align:center;margin-bottom:clamp(8px,2vmin,12px);animation:fU 0.35s 0.1s ease both;}
#s4 .h4 h2{font-size:clamp(17px,4.8vmin,26px);font-weight:900;color:#fff;}
#s4 .h4 h2 b{color:var(--gold);}
#s4 .h4 p{color:rgba(255,255,255,0.3);font-size:clamp(9px,2.2vmin,11px);font-weight:800;letter-spacing:2px;margin-top:3px;text-transform:uppercase;}
.dcard{width:100%;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 8px 28px rgba(0,0,0,0.65);margin-bottom:clamp(8px,2vmin,11px);animation:cslide 0.4s ease both;flex-shrink:0;}
.dcard:nth-child(1){animation-delay:0.12s;}.dcard:nth-child(2){animation-delay:0.24s;}.dcard:nth-child(3){animation-delay:0.36s;}
@keyframes cslide{from{opacity:0;transform:translateX(-22px);}to{opacity:1;transform:translateX(0);}}
.dcard img{width:100%;display:block;object-fit:cover;height:clamp(85px,21vmin,115px);}
.dcard .ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,0.68),transparent 55%);display:flex;align-items:center;padding:0 14px;}
.dcard .ov span{font-size:clamp(13px,3.5vmin,17px);font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.8);}
.dcard .dbadge{position:absolute;top:8px;right:8px;background:var(--gold);color:#000;font-size:clamp(9px,2.2vmin,11px);font-weight:900;padding:3px 9px;border-radius:20px;}

/* ═══════════════════════════════════
   S5 – ALL 8 DESIGNS MOSAIC
═══════════════════════════════════ */
#s5{background:linear-gradient(180deg,#04040c,#0a0a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;}
#s5 .h5{text-align:center;padding:0 5%;margin-bottom:clamp(8px,2vmin,12px);animation:fU 0.35s 0.1s ease both;}
#s5 .h5 h2{font-size:clamp(15px,4.3vmin,23px);font-weight:900;color:#fff;}
#s5 .h5 h2 b{color:var(--gold);}
#s5 .h5 p{color:rgba(255,255,255,0.28);font-size:clamp(9px,2vmin,11px);font-weight:800;letter-spacing:2px;margin-top:3px;text-transform:uppercase;}
#s5 .grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(5px,1.4vmin,8px);padding:0 clamp(8px,2vmin,13px);width:100%;}
.gcell{border-radius:8px;overflow:hidden;position:relative;height:clamp(70px,18vmin,100px);animation:mPop 0.32s cubic-bezier(.34,1.56,.64,1) both;}
.gcell:nth-child(1){animation-delay:.04s;}.gcell:nth-child(2){animation-delay:.09s;}.gcell:nth-child(3){animation-delay:.14s;}.gcell:nth-child(4){animation-delay:.19s;}.gcell:nth-child(5){animation-delay:.24s;}.gcell:nth-child(6){animation-delay:.29s;}.gcell:nth-child(7){animation-delay:.34s;}.gcell:nth-child(8){animation-delay:.39s;}
@keyframes mPop{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
.gcell img{width:100%;height:100%;object-fit:cover;display:block;}
.gcell .sh{position:absolute;inset:0;background:linear-gradient(135deg,transparent 42%,rgba(255,255,255,0.055) 50%,transparent 58%);background-size:200% 200%;animation:shim 2.8s linear infinite;}
@keyframes shim{0%{background-position:200% 200%;}100%{background-position:-200% -200%;}}

/* ═══════════════════════════════════
   S6 – PRICE BOMB
═══════════════════════════════════ */
#s6{background:radial-gradient(ellipse at 50% 38%,#160f00,#000 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
#s6 .rays{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);width:clamp(260px,75vmin,380px);height:clamp(260px,75vmin,380px);pointer-events:none;animation:spin 16s linear infinite;}
.ray{position:absolute;top:50%;left:50%;width:50%;height:1.5px;background:linear-gradient(90deg,rgba(255,215,0,0.13),transparent);transform-origin:0 50%;}
#s6 .pcenter{text-align:center;position:relative;z-index:5;animation:pRev 0.65s 0.2s cubic-bezier(.22,1,.36,1) both;}
@keyframes pRev{from{opacity:0;transform:scale(0.62);}to{opacity:1;transform:scale(1);}}
#s6 .cnt{color:rgba(255,255,255,0.45);font-size:clamp(10px,2.5vmin,13px);font-weight:800;letter-spacing:4px;text-transform:uppercase;display:block;margin-bottom:4px;}
#s6 .pbig{font-size:clamp(70px,19vmin,105px);font-weight:900;color:var(--gold);line-height:1;text-shadow:0 0 55px rgba(255,215,0,0.4),0 0 14px rgba(255,215,0,0.22);}
#s6 .plbl{color:rgba(255,255,255,0.4);font-size:clamp(10px,2.5vmin,13px);font-weight:800;letter-spacing:4px;display:block;margin-top:-3px;}
#s6 .ctags{display:flex;gap:clamp(4px,1.2vmin,7px);align-items:center;justify-content:center;margin-top:clamp(6px,1.5vmin,10px);animation:fU 0.4s 0.6s ease both;position:relative;z-index:5;flex-wrap:wrap;padding:0 5%;}
.ctag{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.25);border-radius:8px;padding:clamp(5px,1.3vmin,8px) clamp(9px,2.3vmin,12px);color:var(--gold);font-size:clamp(10px,2.5vmin,12px);font-weight:900;}
#s6 .divl{width:clamp(110px,35vmin,165px);height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:clamp(12px,3.5vmin,20px) auto;}
#s6 .bens{display:flex;gap:clamp(12px,3.5vmin,20px);position:relative;z-index:5;animation:fU 0.4s 0.75s ease both;}
.ben{display:flex;flex-direction:column;align-items:center;gap:3px;color:#fff;text-align:center;}
.bi{font-size:clamp(20px,5.5vmin,28px);}.bt{font-size:clamp(10px,2.5vmin,12px);font-weight:900;}.bs{color:rgba(255,255,255,0.35);font-size:clamp(9px,2vmin,11px);font-weight:700;}

/* confetti */
.cf{position:absolute;border-radius:2px;pointer-events:none;animation:cfFall linear both;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(105vmin) rotate(540deg);opacity:0;}}

/* ═══════════════════════════════════
   S7 – WHATSAPP CTA
═══════════════════════════════════ */
#s7{background:linear-gradient(160deg,#001c0d,#003318,#001008);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(9px,2.5vmin,16px);}
#s7 .glow{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);width:72%;height:72%;background:radial-gradient(ellipse,rgba(37,211,102,0.12),transparent 62%);pointer-events:none;}
#s7 .wb{display:flex;flex-direction:column;align-items:center;gap:clamp(9px,2.3vmin,15px);animation:fU 0.45s 0.2s ease both;position:relative;z-index:5;}
#s7 .wico{width:clamp(65px,17vmin,95px);height:clamp(65px,17vmin,95px);background:linear-gradient(135deg,#25D366,#128C7E);border-radius:clamp(15px,4vmin,26px);display:flex;align-items:center;justify-content:center;font-size:clamp(34px,9vmin,52px);box-shadow:0 10px 40px rgba(37,211,102,0.36),0 0 0 2px rgba(37,211,102,0.22);animation:wP 2s ease-in-out infinite;}
@keyframes wP{0%,100%{box-shadow:0 10px 40px rgba(37,211,102,0.36),0 0 0 2px rgba(37,211,102,0.22);}50%{box-shadow:0 10px 55px rgba(37,211,102,0.52),0 0 0 9px rgba(37,211,102,0.07);}}
#s7 h2{font-size:clamp(19px,5.3vmin,29px);font-weight:900;color:#fff;text-align:center;line-height:1.25;}
#s7 h2 b{color:var(--gr);}
#s7 .pbox{background:rgba(255,255,255,0.04);border:1.5px solid rgba(37,211,102,0.32);border-radius:12px;padding:clamp(11px,2.8vmin,17px) clamp(18px,4.5vmin,28px);text-align:center;backdrop-filter:blur(8px);}
#s7 .pbox .num{font-size:clamp(17px,4.8vmin,25px);font-weight:900;color:var(--gr);display:block;letter-spacing:1px;}
#s7 .pbox .psub{color:rgba(255,255,255,0.32);font-size:clamp(9px,2.1vmin,11px);font-weight:800;margin-top:3px;letter-spacing:1px;}
#s7 .obtn{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-weight:900;font-size:clamp(13px,3.7vmin,18px);padding:clamp(12px,3.2vmin,16px) clamp(28px,7.5vmin,44px);border-radius:50px;text-decoration:none;display:inline-block;letter-spacing:0.5px;box-shadow:0 7px 28px rgba(37,211,102,0.36);animation:oP 2s ease-in-out infinite 1s;}
@keyframes oP{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
#s7 .ftag{color:rgba(255,255,255,0.32);font-size:clamp(10px,2.4vmin,12px);font-weight:800;display:flex;align-items:center;gap:6px;}
#s7 .ftag b{color:var(--gold);}
#s7 .bubble{position:absolute;background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.18);border-radius:50px;padding:5px 13px;color:rgba(37,211,102,0.65);font-size:clamp(9px,2.1vmin,11px);font-weight:800;pointer-events:none;animation:bUp ease-in-out infinite;}
@keyframes bUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
</style>
